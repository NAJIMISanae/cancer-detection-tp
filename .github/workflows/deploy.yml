name: CI/CD — Cancer Detection App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ════════════════════════════════════════
  # JOB 1 — Tests
  # ════════════════════════════════════════
  test:
    name: Tests & Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Installation des dependances
        run: |
          pip install --upgrade pip
          pip install streamlit joblib numpy pandas Pillow scikit-learn xgboost

      - name: Verification syntaxe Python
        run: |
          python -m py_compile app.py
          echo "Syntaxe Python OK"

      - name: Test imports critiques
        run: |
          python -c "
          import streamlit, joblib, numpy, pandas
          from PIL import Image
          print('OK - tous les imports fonctionnent')
          print('streamlit :', streamlit.__version__)
          print('numpy     :', numpy.__version__)
          print('pandas    :', pandas.__version__)
          "

      - name: Verification presence des modeles
        run: |
          python -c "
          import os
          models = [
              'models/modele1_meilleur.pkl',
              'models/modele2a_cnn_image.keras',
              'models/modele2b_cnn_multimodal.keras',
          ]
          for m in models:
              if os.path.exists(m):
                  size = os.path.getsize(m) / 1024
                  print(f'OK {m} ({size:.0f} KB)')
              else:
                  print(f'MANQUANT {m}')
          "

      - name: Test chargement Modele 1
        run: |
          python -c "
          import joblib, pandas as pd
          features = ['age','sexe_masculin','presence_nodule','subtilite_nodule',
                      'taille_nodule_px','x_nodule_norm','y_nodule_norm',
                      'tabagisme_paquets_annee','toux_chronique','dyspnee',
                      'douleur_thoracique','perte_poids','spo2','antecedent_familial']
          model = joblib.load('models/modele1_meilleur.pkl')
          X = pd.DataFrame([[60,1,1,3,1,0.5,0.4,30,1,0,0,0,95,0]], columns=features)
          pred = model.predict(X)[0]
          proba = model.predict_proba(X)[0]
          print(f'Modele 1 OK - Prediction: {pred} | Probas: {proba.round(3)}')
          "

  # ════════════════════════════════════════
  # JOB 2 — Build Docker
  # ════════════════════════════════════════
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Build image Docker
        run: |
          docker build -t cancer-detection-app:latest .
          echo "Image Docker buildee avec succes"

      - name: Test image Docker
        run: |
          docker run --rm cancer-detection-app:latest \
            python -c "import streamlit, joblib; print('Image Docker valide')"

  # ════════════════════════════════════════
  # JOB 3 — Deploy Render
  # ════════════════════════════════════════
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    continue-on-error: true

    steps:
      - name: Declenchement deploiement Render
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys
          echo "Deploiement Render declenche"
          echo "URL: https://cancer-detection-app.onrender.com"