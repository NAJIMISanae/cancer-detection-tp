# .github/workflows/deploy.yml
# Pipeline CI/CD — Tests + Déploiement automatique sur Render
# Déclenché à chaque push sur la branche main

name: CI/CD — Cancer Detection App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ════════════════════════════════════════
  # JOB 1 — Tests et validation du code
  # ════════════════════════════════════════
  test:
    name: Tests & Validation
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🐍 Installation Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Installation des dépendances
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: ✅ Vérification syntaxe Python (flake8)
        run: |
          pip install flake8
          flake8 app.py --max-line-length=120 --ignore=E501,W503

      - name: 🧪 Test import des modules critiques
        run: |
          python -c "
          import streamlit
          import joblib
          import numpy as np
          import pandas as pd
          from PIL import Image
          print('✅ Tous les imports sont fonctionnels')
          print(f'   streamlit : {streamlit.__version__}')
          print(f'   numpy     : {np.__version__}')
          print(f'   pandas    : {pd.__version__}')
          "

      - name: 📁 Vérification présence des modèles
        run: |
          python -c "
          import os
          models = [
              'models/modele1_meilleur.pkl',
              'models/modele2a_cnn_image.keras',
              'models/modele2b_cnn_multimodal.keras',
          ]
          for m in models:
              if os.path.exists(m):
                  size = os.path.getsize(m) / 1024
                  print(f'✅ {m} ({size:.0f} KB)')
              else:
                  print(f'❌ MANQUANT : {m}')
          "

      - name: 🔬 Test chargement Modèle 1
        run: |
          python -c "
          import joblib, numpy as np, pandas as pd
          model = joblib.load('models/modele1_meilleur.pkl')
          features = ['age','sexe_masculin','presence_nodule','subtilite_nodule',
                      'taille_nodule_px','x_nodule_norm','y_nodule_norm',
                      'tabagisme_paquets_annee','toux_chronique','dyspnee',
                      'douleur_thoracique','perte_poids','spo2','antecedent_familial']
          X = pd.DataFrame([[60,1,1,3,1,0.5,0.4,30,1,0,0,0,95,0]], columns=features)
          proba = model.predict_proba(X)[0]
          pred  = model.predict(X)[0]
          print(f'✅ Modèle 1 OK — Prédiction : {pred} | Probas : {proba.round(3)}')
          "

  # ════════════════════════════════════════
  # JOB 2 — Build Docker
  # ════════════════════════════════════════
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test   # Lance seulement si les tests passent

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🐳 Build de l'image Docker
        run: |
          docker build -t cancer-detection-app:${{ github.sha }} .
          echo "✅ Image Docker buildée avec succès"

      - name: 🔍 Test de l'image Docker
        run: |
          docker run --rm cancer-detection-app:${{ github.sha }} \
            python -c "import streamlit, joblib; print('✅ Image Docker valide')"

  # ════════════════════════════════════════
  # JOB 3 — Déploiement sur Render
  # (uniquement sur push main, pas sur PR)
  # ════════════════════════════════════════
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [test, build]   # Lance seulement si tests ET build passent
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 🚀 Déclenchement du déploiement Render
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"serviceId": "${{ secrets.RENDER_SERVICE_ID }}"}' \
            https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys

      - name: ✅ Déploiement déclenché
        run: |
          echo "🚀 Déploiement Render en cours..."
          echo "📡 URL : https://cancer-detection-app.onrender.com"
          echo "⏱️  Disponible dans 2-3 minutes"
